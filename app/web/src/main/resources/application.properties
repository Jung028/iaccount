server.address=0.0.0.0
server.port=8887
spring.application.name=account-web
spring.security.user.name=admin
spring.security.user.password=devtest123
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
spring.redis.host=localhost
spring.redis.port=6379
management.endpoint.health.validate-group-membership=false
spring.main.allow-bean-definition-overriding=true
# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/account
spring.datasource.username=adam
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Optional: Hibernate dialect (Spring Boot can usually infer it)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Optional: Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MyBatis
mybatis.mapper-locations=classpath*:mapper/custom/*.xml
mybatis.type-aliases-package=com.alipay.account.common.dal.auto.dataobject

# Tell SOFA RPC which port bolt is listening on and what IP to advertise
com.alipay.sofa.rpc.bolt.port=12200
com.alipay.sofa.rpc.registry.address=nacos://127.0.0.1:8848
com.alipay.sofa.rpc.rest.enable=true
com.alipay.sofa.rpc.rest.port=8341



# Kafka bootstrap server (Docker container runs on localhost)
spring.kafka.bootstrap-servers=localhost:9093
zookeeper.connect=localhost:2182
# Producer config
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=account-center
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.alipay.account_center.common.service.facade.event

